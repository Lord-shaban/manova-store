<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>الموردين | لوحة تحكم MANOVA</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Marcellus&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
  <div id="shell"></div>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/firebase.js"></script>
  <script src="/admin/assets/admin.js"></script>
  <script src="/admin/assets/acc.js"></script>
  <script>
    const content = renderShell('suppliers', 'الموردين');
    let SUPPLIERS = [], TREASURIES = [];
    const state = { q: '' };
    const $ = id => document.getElementById(id);

    content.innerHTML = `
      <div class="tiles" id="tiles"></div>
      <div class="filter-row">
        <input class="search-input" id="search" placeholder="بحث بالاسم أو الموبايل">
        <div style="flex:1"></div>
        <button class="btn btn-primary" id="add-btn">+ مورد جديد</button>
      </div>
      <div class="card"><div class="table-wrap" id="table-host"></div></div>`;

    async function load() {
      try {
        await AdminAPI.requireUser();
        AccAPI.processDueCheques();
        [SUPPLIERS, TREASURIES] = await Promise.all([AccAPI.fetchSuppliers(), AccAPI.fetchTreasuries()]);
        render();
      } catch (e) { toast(e.message, 'error'); }
    }

    function render() {
      const totalOwed = SUPPLIERS.reduce((s, x) => s + Math.max(0, Number(x.balance) || 0), 0);
      $('tiles').innerHTML = `
        <div class="tile"><div class="t-label">عدد الموردين</div><div class="t-value">${SUPPLIERS.length}</div></div>
        <div class="tile"><div class="t-label">إجمالي آجل الموردين (علينا)</div><div class="t-value" style="color:${totalOwed ? 'var(--danger)' : 'inherit'}">${money(totalOwed)}</div></div>`;

      const host = $('table-host');
      let list = [...SUPPLIERS].sort((a, b) => (Number(b.balance) || 0) - (Number(a.balance) || 0));
      const needle = state.q.trim();
      if (needle) list = list.filter(s => (s.name || '').includes(needle) || (s.phone || '').includes(needle));
      if (!list.length) {
        host.innerHTML = '<div class="empty-state"><h3>لا يوجد موردين</h3><p>ضيف موردينك وابدأ تسجّل فواتير الشراء عليهم</p></div>';
        return;
      }
      const table = document.createElement('table');
      table.className = 'data';
      table.innerHTML = '<thead><tr><th>المورد</th><th>الموبايل</th><th>الرصيد (علينا)</th><th>الحالة</th><th></th></tr></thead>';
      const tbody = document.createElement('tbody');
      for (const s of list) {
        const bal = Number(s.balance) || 0;
        const tr = document.createElement('tr');
        tr.className = 'clickable';
        tr.innerHTML = `
          <td style="font-weight:800"><div class="s-name"></div><div style="color:var(--muted);font-weight:400;font-size:.76rem" class="s-note"></div></td>
          <td class="num" dir="ltr">${esc(s.phone || '—')}</td>
          <td class="num bal-chip ${bal > 0 ? 'owe' : 'clear'}">${money(bal)}</td>
          <td>${s.active !== false ? '<span class="chip delivered">نشط</span>' : '<span class="chip cancelled">موقوف</span>'}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-gold btn-xs pay">سداد</button>
            <button class="btn btn-outline btn-xs open">كشف حساب</button>
          </td>`;
        tr.querySelector('.s-name').textContent = s.name;
        tr.querySelector('.s-note').textContent = s.note || '';
        tr.addEventListener('click', () => openSupplier(s));
        tr.querySelector('.pay').addEventListener('click', e => { e.stopPropagation(); payModal(s); });
        tr.querySelector('.open').addEventListener('click', e => { e.stopPropagation(); openSupplier(s); });
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      host.innerHTML = '';
      host.appendChild(table);
    }

    function editorModal(s) {
      const isNew = !s;
      openModal({
        title: isNew ? 'إضافة مورد جديد' : 'تعديل المورد',
        bodyHTML: `
          <div class="form-grid">
            <div class="field full"><label>اسم المورد *</label><input id="s-name"></div>
            <div class="field"><label>الموبايل</label><input id="s-phone" inputmode="tel" dir="ltr"></div>
            <div class="field"><label>العنوان</label><input id="s-address"></div>
            ${isNew ? `<div class="field"><label>رصيد افتتاحي (آجل قديم علينا)</label><input id="s-opening" type="number" min="0" value="0" dir="ltr">
              <div class="hint">لو ليه فلوس عندك من قبل السيستم</div></div>` : ''}
            <div class="field ${isNew ? '' : 'full'}"><label>ملاحظات</label><input id="s-note"></div>
            ${isNew ? '' : '<div class="check-row"><input type="checkbox" id="s-active"><label for="s-active">مورد نشط</label></div>'}
          </div>`,
        footHTML: `<button class="btn btn-primary" id="s-save">${isNew ? 'إضافة المورد' : 'حفظ'}</button>`,
      });
      if (s) {
        $('s-name').value = s.name;
        $('s-phone').value = s.phone || '';
        $('s-address').value = s.address || '';
        $('s-note').value = s.note || '';
        $('s-active').checked = s.active !== false;
      }
      $('s-save').addEventListener('click', async () => {
        try {
          if (isNew) {
            await AccAPI.createSupplier({
              name: $('s-name').value, phone: $('s-phone').value, address: $('s-address').value,
              note: $('s-note').value, openingBalance: Number($('s-opening').value) || 0,
            });
          } else {
            await AccAPI.updateSupplier(s.id, {
              name: $('s-name').value, phone: $('s-phone').value, address: $('s-address').value,
              note: $('s-note').value, active: $('s-active').checked,
            });
          }
          toast(isNew ? 'تم إضافة المورد' : 'تم الحفظ');
          closeModal(); load();
        } catch (e) { toast(e.message, 'error'); }
      });
    }

    function payModal(s) {
      openModal({
        title: `سداد للمورد: ${esc(s.name)}`,
        bodyHTML: `
          <div class="drawer-rows" style="margin-bottom:12px">
            <div class="t-row"><span>الرصيد الحالي (علينا)</span><b style="color:var(--danger)">${money(s.balance || 0)}</b></div>
          </div>
          <div class="form-grid">
            <div class="field"><label>المبلغ *</label><input id="p-amount" type="number" min="0" dir="ltr" style="font-size:1.1rem;text-align:center"></div>
            <div class="field"><label>من خزنة *</label>
              <select id="p-treasury">${TREASURIES.map(t => `<option value="${esc(t.id)}">${esc(t.name)} (${money(t.balance)})</option>`).join('')}</select></div>
            <div class="field full"><label>ملاحظة (اختياري)</label><input id="p-note"></div>
          </div>`,
        footHTML: '<button class="btn btn-gold" id="p-save" style="min-width:150px">تسجيل السداد</button>',
      });
      $('p-amount').focus();
      $('p-save').addEventListener('click', async () => {
        const btn = $('p-save');
        btn.disabled = true;
        try {
          await AccAPI.paySupplier(s.id, Number($('p-amount').value), $('p-treasury').value, $('p-note').value);
          toast('تم تسجيل السداد وخصمه من الخزنة ✓');
          closeModal(); load();
        } catch (e) { toast(e.message, 'error'); btn.disabled = false; }
      });
    }

    async function openSupplier(s) {
      let rows = [];
      try { rows = await AccAPI.supplierStatement(s); }
      catch (e) { toast(e.message, 'error'); }
      const bal = Number(s.balance) || 0;
      openModal({
        title: `كشف حساب: ${esc(s.name)}`,
        wide: true,
        bodyHTML: `
          <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:.86rem;margin-bottom:12px;align-items:center">
            <span class="bal-chip ${bal > 0 ? 'owe' : 'clear'}" style="font-size:1.05rem">الرصيد: ${money(bal)}</span>
            ${s.phone ? `<a class="btn btn-outline btn-xs" href="tel:${esc(s.phone)}">اتصال ${esc(s.phone)}</a>` : ''}
            <div style="flex:1"></div>
            <button class="btn btn-gold btn-sm" id="st-pay">سداد</button>
            <button class="btn btn-outline btn-sm" id="st-edit">تعديل البيانات</button>
          </div>
          ${rows.length ? `
            <div class="table-wrap" style="max-height:340px;overflow-y:auto">
              <table class="data">
                <thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th>الرصيد بعده</th></tr></thead>
                <tbody>${rows.map(r => `
                  <tr>
                    <td style="color:var(--muted);font-size:.78rem;white-space:nowrap">${fmtDate(r.at)}</td>
                    <td style="font-size:.84rem">${esc(r.label)}</td>
                    <td class="num" style="font-weight:700;color:${r.delta > 0 ? 'var(--danger)' : r.delta < 0 ? 'var(--good)' : 'var(--muted)'}">
                      ${r.delta > 0 ? '+' : ''}${r.delta ? money(r.delta) : '—'}</td>
                    <td class="num" style="font-weight:800">${money(r.running)}</td>
                  </tr>`).join('')}</tbody>
              </table>
            </div>` : '<div class="empty-state">لا توجد حركات بعد — أول فاتورة شراء هتظهر هنا</div>'}`,
      });
      $('st-pay').addEventListener('click', () => { closeModal(); payModal(s); });
      $('st-edit').addEventListener('click', () => { closeModal(); editorModal(s); });
    }

    $('add-btn').addEventListener('click', () => editorModal(null));
    let debounce;
    $('search').addEventListener('input', e => {
      clearTimeout(debounce);
      debounce = setTimeout(() => { state.q = e.target.value; render(); }, 250);
    });

    load();
  </script>
</body>
</html>
