<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول | لوحة تحكم MANOVA</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <img src="/images/logo.jpeg" alt="MANOVA">
      <h1>لوحة تحكم مانوفا</h1>
      <div class="sub">سجّل الدخول لإدارة متجرك</div>
      <div class="form-error" id="err" style="display:none;background:#fbe7e7;color:#a02525;border-radius:10px;padding:10px 14px;font-weight:700;font-size:.85rem;margin-bottom:14px"></div>
      <div class="form-error" id="msg" style="display:none;background:#e8f6e8;color:#1c7a1c;border-radius:10px;padding:10px 14px;font-weight:700;font-size:.85rem;margin-bottom:14px"></div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input id="email" type="email" autocomplete="username" dir="ltr" style="text-align:center">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="password" type="password" autocomplete="current-password" dir="ltr" style="text-align:center">
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;padding:13px;font-size:1rem;margin-top:8px">تسجيل الدخول</button>
      <button id="forgot-btn" style="background:none;border:none;color:var(--gold-deep);font-weight:700;font-size:.82rem;margin-top:14px;cursor:pointer;font-family:inherit">نسيت كلمة المرور؟</button>
    </div>
  </div>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/firebase.js"></script>
  <script>
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('err');
    const msg = document.getElementById('msg');

    function showErr(text) { msg.style.display = 'none'; err.textContent = text; err.style.display = 'block'; }
    function showMsg(text) { err.style.display = 'none'; msg.textContent = text; msg.style.display = 'block'; }

    function niceAuthError(e) {
      const code = (e && e.code) || '';
      if (code.includes('invalid-credential') || code.includes('wrong-password') || code.includes('user-not-found') || code.includes('invalid-email'))
        return 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
      if (code.includes('too-many-requests')) return 'محاولات كتير — استنى شوية وجرّب تاني';
      if (code.includes('network-request-failed')) return 'تعذر الاتصال — تأكد من الإنترنت';
      return (e && e.message) || 'فشل تسجيل الدخول';
    }

    async function doLogin() {
      err.style.display = 'none';
      btn.disabled = true; btn.textContent = 'جاري الدخول...';
      try {
        const { auth, authM } = await MDB.fbAuth();
        await authM.signInWithEmailAndPassword(
          auth,
          document.getElementById('email').value.trim(),
          document.getElementById('password').value,
        );
        location.href = '/admin';
      } catch (e) {
        showErr(niceAuthError(e));
        btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      }
    }

    document.getElementById('forgot-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { showErr('اكتب بريدك الإلكتروني الأول وبعدين اضغط "نسيت كلمة المرور"'); return; }
      try {
        const { auth, authM } = await MDB.fbAuth();
        await authM.sendPasswordResetEmail(auth, email);
        showMsg('اتبعت رسالة على بريدك فيها رابط تغيير كلمة المرور');
      } catch (e) { showErr(niceAuthError(e)); }
    });

    btn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    // لو مسجل دخول بالفعل، ادخل على اللوحة مباشرة
    (async () => {
      try {
        const { auth, authM } = await MDB.fbAuth();
        const un = authM.onAuthStateChanged(auth, u => { un(); if (u) location.href = '/admin'; });
      } catch { /* إعدادات Firebase لسه ما اتملتش — هيظهر الخطأ عند محاولة الدخول */ }
    })();
  </script>
</body>
</html>
