<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>الإعدادات | لوحة تحكم MANOVA</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Marcellus&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
  <div id="shell"></div>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/firebase.js"></script>
  <script src="/admin/assets/admin.js"></script>
  <script>
    const content = renderShell('settings', 'الإعدادات');
    let S = null;
    let zones = [];

    content.innerHTML = `
      <div style="display:grid;gap:16px;max-width:860px">
        <div class="card"><div class="card-head"><h3>محتوى الصفحة الرئيسية</h3></div>
          <div class="card-body form-grid">
            <div class="field full"><label>عنوان الهيرو الرئيسي</label><input id="s-heroTitle">
              <div class="hint">لو الجملة فيها كلمة "مانوفا" يظهر أعلى صورة الواجهة الرئيسية</div></div>
            <div class="field full"><label>الوصف تحت العنوان</label><textarea id="s-heroSubtitle"></textarea></div>
            <div class="field full"><label>شريط الإعلان أعلى الموقع</label><input id="s-announcement">
              <div class="hint">مثال: خصم 20% لفترة محدودة — سيبه فاضي لو مش عايزه يظهر</div></div>
          </div>
        </div>

        <div class="card"><div class="card-head"><h3>بيانات التواصل</h3></div>
          <div class="card-body form-grid">
            <div class="field"><label>رقم الموبايل</label><input id="s-phone" dir="ltr"></div>
            <div class="field"><label>رقم الواتساب (بكود الدولة)</label><input id="s-whatsapp" dir="ltr" placeholder="201xxxxxxxxx"></div>
            <div class="field"><label>رقم المحفظة الإلكترونية</label><input id="s-walletNumber" dir="ltr">
              <div class="hint">يظهر للعميل لو اختار الدفع بالمحفظة</div></div>
            <div class="field"><label>العنوان</label><input id="s-address"></div>
            <div class="field"><label>رابط فيسبوك</label><input id="s-facebook" dir="ltr" placeholder="https://facebook.com/..."></div>
            <div class="field"><label>رابط انستجرام</label><input id="s-instagram" dir="ltr" placeholder="https://instagram.com/..."></div>
            <div class="field"><label>رابط تيك توك</label><input id="s-tiktok" dir="ltr" placeholder="https://tiktok.com/@..."></div>
          </div>
        </div>

        <div class="card"><div class="card-head"><h3>صور وبانرات الموقع</h3>
          <div class="sub">اتحكم في كل صورة وبانر في المتجر من هنا</div></div>
          <div class="card-body" style="display:grid;gap:22px">
            <!-- الهيرو -->
            <div>
              <div style="font-weight:800;margin-bottom:8px">🖼 صورة الواجهة الرئيسية (الهيرو)</div>
              <div class="img-set" data-key="heroImage" data-ratio="110/120"></div>
              <div class="field" style="margin-top:10px"><label>النص فوق صورة الهيرو (اختياري)</label>
                <input id="s-heroTag" dir="ltr" placeholder="MANOVA COLLECTION"></div>
            </div>

            <!-- البانر التحريري -->
            <div style="border-top:1px solid var(--line);padding-top:18px">
              <div style="font-weight:800;margin-bottom:8px">📰 البانر التحريري (قصة البراند بأسفل الرئيسية)</div>
              <div class="img-set" data-key="editorialImage" data-ratio="120/150"></div>
              <div class="form-grid" style="margin-top:10px">
                <div class="field"><label>السطر العلوي</label><input id="s-editorialKicker" placeholder="قصة مانوفا"></div>
                <div class="field"><label>العنوان</label><input id="s-editorialTitle" placeholder="صناعة مصرية بمعايير لا تقبل الحلول الوسط"></div>
                <div class="field full"><label>النص</label><textarea id="s-editorialBody" style="min-height:80px"></textarea></div>
              </div>
            </div>

            <!-- صور الأقسام -->
            <div style="border-top:1px solid var(--line);padding-top:18px">
              <div style="font-weight:800;margin-bottom:4px">🏷 صور الأقسام</div>
              <div class="hint" style="margin-bottom:12px">صورة كل قسم بتظهر في القائمة المنبثقة وكروت الأقسام بالرئيسية. أي قسم جديد بيظهر هنا تلقائيًا. سيبها فاضية = تتاخد تلقائيًا من أول منتج بالقسم.</div>
              <div id="cat-images" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px"></div>
            </div>
          </div>
        </div>

        <div class="card"><div class="card-head"><h3>رسالة تأكيد الواتساب</h3></div>
          <div class="card-body">
            <div class="field full"><label>نص الرسالة اللي بتتبعت للعميل من صفحة الطلبات</label>
              <textarea id="s-waTemplate" style="min-height:150px" dir="rtl"></textarea>
              <div class="hint">
                الكلمات دي بتتبدل تلقائيًا ببيانات الطلب:
                <b>{الاسم}</b> · <b>{الكود}</b> · <b>{المنتجات}</b> · <b>{الشحن}</b> · <b>{الاجمالي}</b> · <b>{الدفع}</b> · <b>{المنطقة}</b> · <b>{العنوان}</b>
              </div>
              <button class="btn btn-outline btn-xs" id="wa-reset" style="margin-top:8px">استرجاع النص الافتراضي</button>
            </div>
          </div>
        </div>

        <div class="card"><div class="card-head"><h3>مناطق الشحن وأسعارها</h3></div>
          <div class="card-body">
            <div id="zones"></div>
            <button class="btn btn-outline btn-sm" id="add-zone">+ إضافة منطقة</button>
            <div class="form-grid" style="margin-top:16px">
              <div class="field"><label>شحن مجاني للطلبات الأكبر من (ج.م)</label><input id="s-freeShippingOver" type="number" min="0">
                <div class="hint">اكتب 0 لإلغاء الشحن المجاني</div></div>
            </div>
          </div>
        </div>

        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" id="save-btn" style="padding:13px 34px;font-size:1rem">حفظ كل الإعدادات</button>
        </div>

        <div class="card"><div class="card-head"><h3>تغيير كلمة المرور</h3></div>
          <div class="card-body form-grid">
            <div class="field"><label>كلمة المرور الحالية</label><input id="pw-current" type="password" dir="ltr"></div>
            <div class="field"><label>كلمة المرور الجديدة</label><input id="pw-next" type="password" dir="ltr">
              <div class="hint">6 أحرف على الأقل — هيتم تسجيل خروجك بعد التغيير</div></div>
            <div class="full"><button class="btn btn-dark" id="pw-btn">تغيير كلمة المرور</button></div>
          </div>
        </div>

        <div class="card" id="demo-card" style="display:none"><div class="card-head"><h3>البيانات التجريبية</h3></div>
          <div class="card-body">
            <p style="font-size:.9rem;color:var(--ink-2);margin-bottom:12px">المتجر جاي ومعاه طلبات تجريبية عشان تشوف الداشبورد والتقارير شغالة. لما تجهز تستقبل طلبات حقيقية امسحها من هنا — المنتجات مش هتتأثر.</p>
            <button class="btn btn-danger-soft" id="clear-demo">مسح كل الطلبات التجريبية</button>
          </div>
        </div>
      </div>`;

    const $ = id => document.getElementById(id);
    const FIELDS = ['heroTitle', 'heroSubtitle', 'announcement', 'phone', 'whatsapp', 'walletNumber', 'address', 'facebook', 'instagram', 'tiktok', 'freeShippingOver', 'waTemplate',
      'heroTag', 'editorialKicker', 'editorialTitle', 'editorialBody'];
    // صور البانرات — كائن واحد قيمه روابط، والأقسام في categoryImages
    const IMG = { heroImage: '', editorialImage: '' };
    let categoryImages = {};   // {slug: url}
    let CATS = [];

    const WA_DEFAULT = `أهلًا {الاسم} 👋
معاك متجر MANOVA — بنأكد طلبك رقم {الكود}:

{المنتجات}

الشحن: {الشحن}
الإجمالي: {الاجمالي} (دفع {الدفع})
العنوان: {المنطقة} — {العنوان}

تمام كده نبدأ التجهيز؟ 🙏`;
    $('wa-reset').addEventListener('click', () => { $('s-waTemplate').value = WA_DEFAULT; });

    /* ---------- مكوّن رفع صورة عام (معاينة + رفع + مسح) ----------
       get/set: دالتان لقراءة/كتابة رابط الصورة · fallback: الصورة الافتراضية للمعاينة */
    function buildImgSet(box, { get, set, fallback, ratio }) {
      const [h, w] = String(ratio || '110/150').split('/').map(Number);
      box.innerHTML = `
        <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap">
          <img class="is-preview" style="width:${w || 130}px;aspect-ratio:${(w || 130)}/${(h || 110)};object-fit:cover;border-radius:10px;border:1px solid var(--line);background:#f4f1e9" alt="">
          <div>
            <input type="file" class="is-file" accept=".jpg,.jpeg,.png,.webp" style="display:none">
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button type="button" class="btn btn-outline btn-sm is-upload">رفع صورة</button>
              <button type="button" class="btn btn-danger-soft btn-sm is-reset">مسح</button>
            </div>
          </div>
        </div>`;
      const preview = box.querySelector('.is-preview');
      const file = box.querySelector('.is-file');
      const upBtn = box.querySelector('.is-upload');
      const refresh = () => MDB.bindImg(preview, get() || fallback);
      upBtn.addEventListener('click', () => file.click());
      file.addEventListener('change', async e => {
        if (!e.target.files.length) return;
        upBtn.textContent = 'جاري الرفع…';
        try {
          const urls = await AdminAPI.upload(e.target.files);
          set(urls[0]); refresh();
          toast('اترفعت — متنساش تدوس «حفظ كل الإعدادات»');
        } catch (err) { toast(err.message, 'error'); }
        upBtn.textContent = 'رفع صورة'; e.target.value = '';
      });
      box.querySelector('.is-reset').addEventListener('click', () => { set(''); refresh(); });
      refresh();
    }

    // الهيرو والبانر التحريري
    document.querySelectorAll('.img-set[data-key]').forEach(box => {
      const key = box.dataset.key;
      buildImgSet(box, {
        get: () => IMG[key], set: v => { IMG[key] = v; },
        fallback: key === 'heroImage' ? '/images/products/tee-basic-black.jpeg' : '/images/products/tee-wanderlust-brown.jpeg',
        ratio: box.dataset.ratio,
      });
    });

    // صور الأقسام — عنصر لكل قسم (بيتبني بعد تحميل الأقسام)
    function renderCatImages() {
      const host = $('cat-images');
      host.innerHTML = '';
      if (!CATS.length) { host.innerHTML = '<div class="hint">لا توجد أقسام بعد</div>'; return; }
      for (const c of CATS) {
        const card = document.createElement('div');
        card.style.cssText = 'border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff';
        card.innerHTML = `<div style="font-weight:800;font-size:.86rem;margin-bottom:8px">${c.parent ? '↳ ' : ''}${esc(c.name)}${c.parent ? '' : ' <span style="color:var(--gold-deep);font-size:.66rem">رئيسي</span>'}</div>
          <div class="cat-img-set"></div>`;
        buildImgSet(card.querySelector('.cat-img-set'), {
          get: () => categoryImages[c.slug] || '',
          set: v => { if (v) categoryImages[c.slug] = v; else delete categoryImages[c.slug]; },
          fallback: c.cover || '/images/products/tee-basic-black.jpeg',
          ratio: '120/150',
        });
        host.appendChild(card);
      }
    }

    function renderZones() {
      const wrap = $('zones');
      wrap.innerHTML = '';
      zones.forEach((z, i) => {
        const row = document.createElement('div');
        row.className = 'zone-row';
        row.innerHTML = `
          <div class="field"><input placeholder="اسم المنطقة" value="${esc(z.name)}"></div>
          <div class="field"><input type="number" min="0" placeholder="السعر" value="${z.fee}"></div>
          <button class="icon-btn" title="حذف">✕</button>`;
        const [nameIn, feeIn] = row.querySelectorAll('input');
        nameIn.addEventListener('input', e => zones[i].name = e.target.value);
        feeIn.addEventListener('input', e => zones[i].fee = Number(e.target.value) || 0);
        row.querySelector('button').addEventListener('click', () => {
          if (zones.length <= 1) { toast('لازم منطقة شحن واحدة على الأقل', 'error'); return; }
          zones.splice(i, 1); renderZones();
        });
        wrap.appendChild(row);
      });
    }
    $('add-zone').addEventListener('click', () => { zones.push({ name: '', fee: 0 }); renderZones(); });

    $('save-btn').addEventListener('click', async () => {
      const payload = {
        shipping: zones.filter(z => z.name.trim()),
        heroImage: IMG.heroImage, editorialImage: IMG.editorialImage,
        categoryImages,
      };
      for (const f of FIELDS) payload[f] = f === 'freeShippingOver' ? Number($('s-' + f).value) || 0 : $('s-' + f).value;
      const btn = $('save-btn');
      btn.disabled = true; btn.textContent = 'جاري الحفظ…';
      try {
        await AdminAPI.put('/api/admin/settings', payload);
        toast('تم حفظ الإعدادات — التغييرات ظهرت في المتجر فورًا');
      } catch (e) { toast(e.message, 'error'); }
      btn.disabled = false; btn.textContent = 'حفظ كل الإعدادات';
    });

    $('pw-btn').addEventListener('click', async () => {
      try {
        await AdminAPI.put('/api/admin/password', { current: $('pw-current').value, next: $('pw-next').value });
        toast('تم تغيير كلمة المرور — سجّل الدخول من جديد');
        setTimeout(() => location.href = '/admin/login', 1200);
      } catch (e) { toast(e.message, 'error'); }
    });

    $('clear-demo').addEventListener('click', async () => {
      if (!confirm('هيتم حذف كل الطلبات التجريبية نهائيًا. متأكد؟')) return;
      try {
        const r = await AdminAPI.post('/api/admin/clear-demo', {});
        toast('تم حذف ' + r.removed + ' طلب تجريبي');
        $('demo-card').style.display = 'none';
      } catch (e) { toast(e.message, 'error'); }
    });

    // إعادة تحديث معاينات الهيرو والبانر بعد تحميل الروابط
    function refreshBanners() {
      document.querySelectorAll('.img-set[data-key] .is-preview').forEach(pv => {
        const key = pv.closest('.img-set').dataset.key;
        MDB.bindImg(pv, IMG[key] || (key === 'heroImage' ? '/images/products/tee-basic-black.jpeg' : '/images/products/tee-wanderlust-brown.jpeg'));
      });
    }

    (async () => {
      try {
        const [settings, cats] = await Promise.all([
          AdminAPI.get('/api/admin/settings'),
          AdminAPI.get('/api/admin/categories'),
        ]);
        S = settings;
        for (const f of FIELDS) $('s-' + f).value = S[f] ?? '';
        if (!S.waTemplate) $('s-waTemplate').value = WA_DEFAULT;
        IMG.heroImage = S.heroImage || '';
        IMG.editorialImage = S.editorialImage || '';
        categoryImages = { ...(S.categoryImages || {}) };
        refreshBanners();
        // الأقسام: رئيسي الأول وتحته فروعه (لعرض مرتب في صور الأقسام)
        const mains = cats.filter(c => !c.parent);
        CATS = [];
        for (const m of mains) {
          CATS.push(m);
          cats.filter(c => c.parent === m.slug).forEach(c => CATS.push(c));
        }
        // كوفر افتراضي لكل قسم للمعاينة (نفس منطق المتجر تقريبًا)
        renderCatImages();
        zones = (S.shipping || []).map(z => ({ ...z }));
        renderZones();
        const stats = await AdminAPI.get('/api/admin/stats?days=7');
        if (stats.hasDemo) $('demo-card').style.display = '';
      } catch (e) { toast(e.message, 'error'); }
    })();
  </script>
</body>
</html>
