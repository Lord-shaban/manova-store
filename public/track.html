<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تتبع طلبك | MANOVA مانوفا</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Marcellus&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/store.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="container center-page" style="text-align:start">
    <h1 style="text-align:center">تتبع طلبك</h1>
    <p class="muted" style="text-align:center;margin-bottom:30px">أدخل رقم الطلب ورقم الموبايل المسجل به</p>

    <div class="form-card">
      <div class="form-error" id="err"></div>
      <div class="form-grid">
        <div class="field"><label>رقم الطلب</label><input id="f-code" dir="ltr" placeholder="MN-XXXXXX" class="latin" style="text-align:center;letter-spacing:.18em"></div>
        <div class="field"><label>رقم الموبايل</label><input id="f-phone" dir="rtl" inputmode="numeric" maxlength="11" placeholder="01xxxxxxxxx"></div>
      </div>
      <button class="btn btn-dark btn-block" id="track-btn" style="margin-top:18px">بحث عن الطلب</button>
    </div>

    <div id="result" style="margin-top:28px"></div>
  </div>

  <div id="site-footer"></div>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/firebase.js"></script>
  <script src="/js/store.js"></script>
  <script>
    const STATUS_FLOW = [
      { key: 'new', label: 'تم استلام الطلب', desc: 'وصلنا طلبك وسنراجعه سريعًا' },
      { key: 'confirmed', label: 'تم تأكيد الطلب', desc: 'تواصلنا معك وأكدنا التفاصيل' },
      { key: 'shipped', label: 'جاري الشحن', desc: 'الطلب في الطريق إليك' },
      { key: 'delivered', label: 'تم التوصيل', desc: 'استلمت طلبك — نتمنى أن ينال إعجابك' },
    ];

    const codeInput = document.getElementById('f-code');
    const prefill = new URLSearchParams(location.search).get('code');
    if (prefill) codeInput.value = prefill;

    document.getElementById('track-btn').addEventListener('click', track);
    async function track() {
      const err = document.getElementById('err');
      const result = document.getElementById('result');
      err.classList.remove('show');
      result.innerHTML = '';
      // تطبيع الكود: كابيتال + إضافة MN- تلقائيًا لو المستخدم كتب الأرقام بس
      let code = codeInput.value.trim().toUpperCase().replace(/\s/g, '');
      if (code && !code.startsWith('MN-')) code = 'MN-' + code.replace(/^MN/, '');
      codeInput.value = code;
      const phone = document.getElementById('f-phone').value.trim();
      if (!code || !phone) { err.textContent = 'أدخل رقم الطلب ورقم الموبايل'; err.classList.add('show'); return; }
      try {
        const o = await API.get('/api/track?code=' + encodeURIComponent(code) + '&phone=' + encodeURIComponent(phone));
        renderOrder(o);
      } catch (e) {
        err.textContent = e.message;
        err.classList.add('show');
      }
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', hour: 'numeric', minute: '2-digit' });
    }

    function renderOrder(o) {
      const cancelled = o.status === 'cancelled';
      const reachedIdx = STATUS_FLOW.findIndex(s => s.key === o.status);
      const histMap = {};
      for (const h of o.statusHistory) histMap[h.status] = h.at;
      const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke-width="3"><path d="M4.5 12.5l5 5 10-11"/></svg>';

      let timeline;
      if (cancelled) {
        timeline = `
          <div class="tl-step done"><div class="tl-dot">${checkSvg}</div><div class="tl-body"><b>تم استلام الطلب</b><span>${fmtDate(o.createdAt)}</span></div></div>
          <div class="tl-step done cancel"><div class="tl-dot">${checkSvg}</div><div class="tl-body"><b>تم إلغاء الطلب</b><span>${histMap.cancelled ? fmtDate(histMap.cancelled) : ''} — إن كان هذا خطأً تواصل معنا عبر واتساب</span></div></div>`;
      } else {
        timeline = STATUS_FLOW.map((s, i) => `
          <div class="tl-step ${i <= reachedIdx ? 'done' : ''}">
            <div class="tl-dot">${checkSvg}</div>
            <div class="tl-body"><b>${s.label}</b><span>${i <= reachedIdx ? (histMap[s.key] ? fmtDate(histMap[s.key]) : s.desc) : s.desc}</span></div>
          </div>`).join('');
      }

      const result = document.getElementById('result');
      result.innerHTML = `
      <div class="form-card">
        <h3 style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span>طلب <span dir="ltr" class="latin" style="letter-spacing:.14em;color:var(--gold-deep)">${o.id}</span></span>
          <span style="font-size:.78rem;color:var(--muted);font-weight:400">${o.zone}</span>
        </h3>
        <div class="timeline">${timeline}</div>
        <div style="border-top:1px solid var(--line);padding-top:16px;margin-top:8px">
          <div id="track-items" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px"></div>
          <div class="sum-row"><span>المجموع الفرعي</span><b>${money(o.subtotal)}</b></div>
          <div class="sum-row"><span>الشحن</span><b>${o.shippingFee === 0 ? 'مجاني' : money(o.shippingFee)}</b></div>
          <div class="sum-row total"><span>الإجمالي</span><span>${money(o.total)}</span></div>
        </div>
      </div>`;
      const wrap = document.getElementById('track-items');
      o.items.forEach(it => {
        const d = document.createElement('div');
        d.style.cssText = 'display:flex;justify-content:space-between;font-size:.86rem;color:var(--ink-2)';
        const n = document.createElement('span');
        n.textContent = `${it.name} ${it.size ? '(' + it.size + ')' : ''} × ${it.qty}`;
        const p = document.createElement('b');
        p.style.color = 'var(--ink)';
        p.textContent = money(it.price * it.qty);
        d.append(n, p);
        wrap.appendChild(d);
      });
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>
</body>
</html>
