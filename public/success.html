<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تم استلام طلبك | MANOVA مانوفا</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/store.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="container center-page">
    <div class="big-check"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4.5 12.5l5 5 10-11"/></svg></div>
    <h1>تم استلام طلبك بنجاح</h1>
    <p class="muted">شكرًا لثقتك في مانوفا. سنتواصل معك قريبًا لتأكيد الطلب وتحديد موعد التوصيل.</p>
    <div class="order-code-box"><small>رقم الطلب</small><span id="order-code" dir="ltr">—</span></div>
    <p class="muted" style="font-size:.8rem">احتفظ برقم الطلب — ستحتاجه لتتبع شحنتك في أي وقت.</p>
    <div style="display:flex;gap:14px;justify-content:center;margin-top:30px;flex-wrap:wrap">
      <a href="/track" class="btn btn-dark" id="track-link">تتبع طلبك</a>
      <a href="/shop" class="btn btn-line">مواصلة التسوق</a>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="/js/store.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get('order') || '—';
    document.getElementById('order-code').textContent = code;
    document.getElementById('track-link').href = '/track?code=' + encodeURIComponent(code);
  </script>
</body>
</html>
