<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول | لوحة تحكم MANOVA</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <img src="/images/logo.jpeg" alt="MANOVA">
      <h1>لوحة تحكم مانوفا</h1>
      <div class="sub">سجّل الدخول لإدارة متجرك</div>
      <div class="form-error" id="err" style="display:none;background:#fbe7e7;color:#a02525;border-radius:10px;padding:10px 14px;font-weight:700;font-size:.85rem;margin-bottom:14px"></div>
      <div class="field">
        <label>اسم المستخدم</label>
        <input id="username" autocomplete="username" dir="ltr" style="text-align:center">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="password" type="password" autocomplete="current-password" dir="ltr" style="text-align:center">
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;padding:13px;font-size:1rem;margin-top:8px">تسجيل الدخول</button>
    </div>
  </div>
  <script>
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('err');
    async function doLogin() {
      err.style.display = 'none';
      btn.disabled = true; btn.textContent = 'جاري الدخول...';
      try {
        const r = await fetch('/api/admin/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || 'فشل تسجيل الدخول');
        location.href = '/admin';
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      }
    }
    btn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
